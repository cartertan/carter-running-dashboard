// Storage helpers using localStorage
const LS_KEY = "carter_fitness_v2";
function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      // Merge strava runs (avoid duplicates by date+distance)
      const existing = new Set(d.runs.map(r => r.date + "_" + r.distance));
      const newRuns = STRAVA_RUNS.filter(r => !existing.has(r.date + "_" + r.distance));
      d.runs = [...d.runs, ...newRuns].sort((a,b)=>a.date.localeCompare(b.date));
      return d;
    }
  } catch(e) {}
  return { runs: [...STRAVA_RUNS], lifts: [], nutrition: [] };
}
function saveData(d) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(d)); } catch(e) {}

    return runs.filter(r=>r.pace && Number(r.distance)>=3).slice(-60).map(r=>({
      date: r.date,
      paceMin: paceToSec(r.pace)/60,
      dist: Number(r.distance)

  }, [runs]);

  useEffect(() => {
    if (!chartRef.current || !chartRef2.current) return;

    if (chartInst.current) chartInst.current.destroy();

    const labels = weeklyData.map(([k]) => k.slice(5));
    const kms = weeklyData.map(([,v]) => Math.round(v.km * 10) / 10);

          y: { ticks: { color: C.muted, font: { size: 10 } }, grid: { color: C.border }, beginAtZero: true }
        }
      }
    });

    const paceLabels = paceTrend.map(p => p.date.slice(5));
    const paceVals = paceTrend.map(p => Math.round(p.paceMin * 100) / 100);

    chartInst2.current = new Chart(chartRef2.current, {
      type: "line",
      data: {
        labels: paceLabels,
        datasets: [{

          pointRadius: 2, pointBackgroundColor: C.accent,
          tension: 0.3, fill: true, borderWidth: 1.5
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => secToPace(ctx.parsed.y * 60) + " /km" } } },
        scales: {
          x: { ticks: { color: C.muted, font: { size: 10 }, maxTicksLimit: 10 }, grid: { color: C.border } },
          y: { reverse: true, ticks: { color: C.muted, font: { size: 10 }, callback: v => secToPace(v*60) }, grid: { color: C.border } }
        }
      }
    });

    return () => { chartInst.current?.destroy(); chartInst2.current?.destroy(); };
  }, [weeklyData, paceTrend]);

  // Monthly stats
  const byMonth = useMemo(() => {
    const m = {};
    runs.forEach(r => {
      const key = r.date.slice(0,7);
      if (!m[key]) m[key] = { km:0, runs:0 };
      m[key].km += Number(r.distance||0);
      m[key].runs++;
    });
    return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0])).slice(-6);
  }, [runs]);

  return React.createElement("div", null,
    React.createElement("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:20 } },
      React.createElement("div", { style:{ ...css.card } },
        React.createElement("p", { style:{ fontSize:12, color:C.muted, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:12 } }, "Weekly Volume (last 24 weeks)"),
        React.createElement("div", { style:{ height:180 } },
          React.createElement("canvas", { ref:chartRef })
        )
      ),
      React.createElement("div", { style:{ ...css.card } },
        React.createElement("p", { style:{ fontSize:12, color:C.muted, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:12 } }, "Pace Trend — runs ≥3km (last 60)"),
        React.createElement("div", { style:{ height:180 } },
          React.createElement("canvas", { ref:chartRef2 })
        )
      )
    ),
    React.createElement("div", { style:css.card },
      React.createElement("p", { style:{ fontSize:12, color:C.muted, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:12 } }, "Monthly Summary"),
      React.createElement("div", { style:{ overflowX:"auto" } },
        React.createElement("table", { style:{ width:"100%", borderCollapse:"collapse", fontSize:13 } },
          React.createElement("thead", null,
            React.createElement("tr", null,
              ["Month","Runs","Total km","Avg km/run","Avg pace","Avg HR"].map(h =>
                React.createElement("th", { key:h, style:{ textAlign:"left", padding:"6px 10px", color:C.muted, fontSize:11, fontWeight:500, textTransform:"uppercase", letterSpacing:"0.06em", borderBottom:`1px solid ${C.border}` } }, h)
              )
            )
          ),
          React.createElement("tbody", null,
            byMonth.reverse().map(([month, v]) => {
              const monthRuns = runs.filter(r=>r.date.startsWith(month));
              const avgPaces = monthRuns.filter(r=>r.pace);
              const avgPaceSec = avgPaces.length ? avgPaces.reduce((s,r)=>s+paceToSec(r.pace),0)/avgPaces.length : null;
              const hRuns = monthRuns.filter(r=>r.hr);
              const avgHR = hRuns.length ? Math.round(hRuns.reduce((s,r)=>s+Number(r.hr),0)/hRuns.length) : null;
              return React.createElement("tr", { key:month, style:{ borderBottom:`1px solid ${C.border}` } },
                React.createElement("td", { style:{ padding:"8px 10px", color:C.text, fontWeight:500 } }, month),
                React.createElement("td", { style:{ padding:"8px 10px", color:C.muted } }, v.runs),
                React.createElement("td", { style:{ padding:"8px 10px", color:C.accent, fontWeight:600 } }, v.km.toFixed(1)),
                React.createElement("td", { style:{ padding:"8px 10px", color:C.muted } }, (v.km/v.runs).toFixed(1)),
                React.createElement("td", { style:{ padding:"8px 10px", color:C.muted, fontFamily:"monospace" } }, avgPaceSec ? secToPace(avgPaceSec) : "—"),
                React.createElement("td", { style:{ padding:"8px 10px", color:C.muted } }, avgHR ? avgHR+" bpm" : "—")
              );
            })
          )
        )
      )
    )
  );
}

function LogWorkout({ data, save }) {
  const [mode, setMode] = useState("run");
  const [run, setRun] = useState({ date:today(), distance:"", duration:"", pace:"", hr:"", notes:"" });
  const [lift, setLift] = useState({ date:today(), exercise:EXERCISES[0], sets:"", reps:"", weight:"", notes:"" });
  const [msg, setMsg] = useState("");

  function calcPace() {
    if (run.distance && run.duration) {
      const parts = run.duration.split(":").map(Number);
      const mins = parts[0]+(parts[1]||0)/60;
      const pace = mins/Number(run.distance);
      const pm=Math.floor(pace),ps=Math.round((pace-pm)*60);
      setRun(r=>({...r,pace:`${pm}:${ps<10?"0"+ps:ps}`}));
    }
  }

  function logRun() {
    if (!run.distance) return;
    const next={...data, runs:[...data.runs,{...run}].sort((a,b)=>a.date.localeCompare(b.date))};
    save(next); setMsg("Run logged!");
    setRun({date:today(),distance:"",duration:"",pace:"",hr:"",notes:""});
    setTimeout(()=>setMsg(""),2500);
  }

  function logLift() {
    if (!lift.sets||!lift.reps) return;
    const next={...data, lifts:[...data.lifts,{...lift}]};
    save(next); setMsg("Lift logged!");
    setLift({date:today(),exercise:EXERCISES[0],sets:"",reps:"",weight:"",notes:""});
    setTimeout(()=>setMsg(""),2500);
  }

  return React.createElement("div", null,
    React.createElement("div", { style:{display:"flex",gap:8,marginBottom:20} },
      ["run","lift"].map(m=>React.createElement("button",{key:m,onClick:()=>setMode(m),style:{...css.btn,background:mode===m?C.accent:"transparent",color:mode===m?"#0a0a0a":C.text,borderColor:mode===m?C.accent:C.border,fontWeight:mode===m?600:400}}, m==="run"?"Running":"Strength"))
    ),
    mode==="run" && React.createElement("div",{style:{...css.card}},
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
        ...[
          ["Date","date","date",run.date,e=>setRun(r=>({...r,date:e.target.value}))],
          ["Distance (km)","number","10",run.distance,e=>setRun(r=>({...r,distance:e.target.value})),calcPace],
          ["Duration (mm:ss)","text","60:00",run.duration,e=>setRun(r=>({...r,duration:e.target.value})),calcPace],
          ["Pace (min/km)","text","auto-calc",run.pace,e=>setRun(r=>({...r,pace:e.target.value}))],
          ["Heart rate","number","145",run.hr,e=>setRun(r=>({...r,hr:e.target.value}))],
          ["Notes","text","Zone 2 easy",run.notes,e=>setRun(r=>({...r,notes:e.target.value}))]
        ].map(([label,type,ph,val,onChange,onBlur])=>
          React.createElement("div",{key:label},
            React.createElement("label",{style:css.label},label),
            React.createElement("input",{style:css.inp,type,placeholder:ph,value:val,onChange,onBlur:onBlur||undefined})
          )
        ),
        React.createElement("div",{style:{gridColumn:"1/-1",display:"flex",alignItems:"center",gap:12,paddingTop:8}},
          React.createElement("button",{onClick:logRun,style:css.btnAccent},"Log Run"),
          msg&&React.createElement("span",{style:{fontSize:13,color:C.green}},msg)
        )
      )
    ),
    mode==="lift" && React.createElement("div",{style:{...css.card}},
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
        React.createElement("div",null,React.createElement("label",{style:css.label},"Date"),React.createElement("input",{style:css.inp,type:"date",value:lift.date,onChange:e=>setLift(l=>({...l,date:e.target.value}))})),
        React.createElement("div",null,React.createElement("label",{style:css.label},"Exercise"),
          React.createElement("select",{style:{...css.inp},value:lift.exercise,onChange:e=>setLift(l=>({...l,exercise:e.target.value}))},
            EXERCISES.map(ex=>React.createElement("option",{key:ex},ex))
          )
        ),
        ...[["Sets","sets","3"],["Reps","reps","10"],["Weight (kg)","weight","60"],["Notes","notes","Optional"]].map(([label,field,ph])=>
          React.createElement("div",{key:field},React.createElement("label",{style:css.label},label),React.createElement("input",{style:css.inp,type:field==="notes"?"text":"number",placeholder:ph,value:lift[field],onChange:e=>setLift(l=>({...l,[field]:e.target.value}))}))
        ),
        React.createElement("div",{style:{gridColumn:"1/-1",display:"flex",alignItems:"center",gap:12,paddingTop:8}},
          React.createElement("button",{onClick:logLift,style:css.btnAccent},"Log Lift"),
          msg&&React.createElement("span",{style:{fontSize:13,color:C.green}},msg)
        )
      )
    )
  );
}

        React.createElement("tbody",null,recent.map((n,i)=>React.createElement("tr",{key:i,style:{borderTop:`1px solid ${C.border}`}},
          React.createElement("td",{style:{padding:"6px 8px",color:C.text}},n.date),
          React.createElement("td",{style:{padding:"6px 8px"}},n.calories||"—"),
          React.createElement("td",{style:{padding:"6px 8px"}},n.protein?n.protein+"g":"—"),
          React.createElement("td",{style:{padding:"6px 8px"}},n.carbs?n.carbs+"g":"—"),

        )))

function AICoach({ data }) {
  const [msgs, setMsgs] = useState([{role:"assistant",text:"Hey Carter! Your Strava data is loaded — 331 runs and nearly 2,000 km since Sep 2024. Ask me anything about your training, pacing, recovery, or your path to sub-1:50."}]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  const { runs } = data;
  const totalKm = runs.reduce((s,r)=>s+Number(r.distance||0),0);
  const weekKm = runs.filter(r=>(new Date()-new Date(r.date))/864e5<=7).reduce((s,r)=>s+Number(r.distance||0),0);
  const paces = runs.filter(r=>r.pace&&Number(r.distance)>=5);
  const avgPaceSec = paces.length ? paces.reduce((s,r)=>s+paceToSec(r.pace),0)/paces.length : null;
  const recent5 = [...runs].reverse().slice(0,5);

  async function send() {
    if (!input.trim()||loading) return;
    const userMsg=input.trim(); setInput("");
    setMsgs(m=>[...m,{role:"user",text:userMsg}]); setLoading(true);

    const context = `Athlete: Carter Tan, 45, Singapore. VO2max ~48-50, MaxHR ~186bpm, LT pace ~5:10/km, Zone2 HR 135-148bpm.
Goals: Sub-1:50 HM (stretch 1:45, long-term 1:30), 2.4km <10:30.
Weekly volume: 60-90km. Uses Norwegian 4x4, cruise intervals, 30km LSDs.
Strava data: ${runs.length} runs, ${totalKm.toFixed(0)}km total since Sep 2024.
This week: ${weekKm.toFixed(1)}km.
Avg pace (runs ≥5km): ${avgPaceSec ? secToPace(avgPaceSec) : "N/A"} /km.
Recent runs: ${JSON.stringify(recent5)}.
Recovery: cold plunge, sauna, Garmin HRV tracking. Singapore heat is a factor.`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1000,
          system:`You are Carter Tan's professional endurance running coach. He is a data-driven athlete with nearly 2000km of Strava data. Provide specific, evidence-based coaching advice. Be direct and concise. Reference his data when useful. Context: ${context}`,
          messages:msgs.filter((_,i)=>i>0).concat([{role:"user",content:userMsg}]).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}))
        })
      });
      const d=await res.json();
      setMsgs(m=>[...m,{role:"assistant",text:d.content?.[0]?.text||"No response."}]);
    } catch(e) { setMsgs(m=>[...m,{role:"assistant",text:"Network error. Please try again."}]); }
    setLoading(false);
  }

  const suggestions=["What does my pace trend say?","Am I on track for sub-1:50?","Analyze my weekly volume","Plan next week's training"];

  return React.createElement("div",{style:{display:"flex",flexDirection:"column",height:500}},
    React.createElement("div",{style:{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,paddingBottom:8}},
      msgs.map((m,i)=>React.createElement("div",{key:i,style:{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}},
        React.createElement("div",{style:{maxWidth:"82%",padding:"10px 14px",borderRadius:12,fontSize:13,lineHeight:1.6,
          background:m.role==="user"?C.accent+"20":"#1e1e1e",
          color:m.role==="user"?C.accent:C.text,
          border:`1px solid ${m.role==="user"?C.accent+"40":C.border}`,whiteSpace:"pre-wrap"}},m.text)
      )),
      loading&&React.createElement("div",{style:{display:"flex"}},React.createElement("div",{style:{padding:"10px 14px",background:"#1e1e1e",borderRadius:12,fontSize:13,color:C.muted,border:`1px solid ${C.border}`}},"Thinking…")),
      React.createElement("div",{ref:endRef})
    ),
    msgs.length===1&&React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}},
      suggestions.map(s=>React.createElement("button",{key:s,onClick:()=>setInput(s),style:{...css.btn,fontSize:12,padding:"5px 12px",borderRadius:20}},s))
    ),
    React.createElement("div",{style:{display:"flex",gap:8,borderTop:`1px solid ${C.border}`,paddingTop:10}},
      React.createElement("input",{value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>e.key==="Enter"&&send(),placeholder:"Ask your coach…",style:{...css.inp,flex:1}}),
      React.createElement("button",{onClick:send,disabled:loading,style:{...css.btnAccent,opacity:loading?0.6:1}},"Send")
    )
  );
}
